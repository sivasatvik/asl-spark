<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SignPath — Learn ASL</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2236;
    --accent: #4fffb0;
    --accent2: #00c9ff;
    --accent3: #ff6b6b;
    --text: #e8edf5;
    --muted: #64748b;
    --border: #1e2d45;
    --radius: 16px;
    --glow: 0 0 30px rgba(79,255,176,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; }

  /* ───── NAV ───── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    height: 62px;
    background: rgba(10,14,23,0.85);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.35rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo span { -webkit-text-fill-color: var(--text); opacity: 0.5; font-weight: 400; }
  .nav-xp {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .xp-bar-wrap { width: 80px; height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .xp-bar { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius: 999px; transition: width 0.6s ease; }

  /* ───── LAYOUT ───── */
  .app { position: relative; z-index: 1; display: flex; height: calc(100vh - 62px); }

  /* ───── SIDEBAR ───── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 4px 10px 12px;
  }
  .lesson-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
  }
  .lesson-btn:hover { background: var(--surface2); border-color: var(--border); }
  .lesson-btn.active {
    background: rgba(79,255,176,0.08);
    border-color: rgba(79,255,176,0.25);
    color: var(--accent);
  }
  .lesson-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .lesson-btn.active .lesson-icon { background: rgba(79,255,176,0.12); }
  .lesson-info { flex: 1; }
  .lesson-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem; }
  .lesson-count { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
  .lesson-done {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; color: #000; font-weight: 700; flex-shrink: 0;
  }
  .lesson-lock { color: var(--muted); font-size: 0.8rem; flex-shrink: 0; }

  /* ───── MAIN CONTENT ───── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .lesson-header { display: flex; flex-direction: column; gap: 6px; }
  .lesson-tag {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
  }
  .lesson-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem; font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .lesson-desc { color: var(--muted); font-size: 0.95rem; max-width: 560px; line-height: 1.6; }

  /* Progress bar */
  .progress-row { display: flex; align-items: center; gap: 14px; }
  .prog-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  .prog-track { flex: 1; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius: 999px; transition: width 0.5s ease; }

  /* ───── WORD GRID ───── */
  .words-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }
  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .word-card:hover { transform: translateY(-3px); border-color: rgba(79,255,176,0.3); box-shadow: var(--glow); }
  .word-card.completed { border-color: rgba(79,255,176,0.4); }
  .word-card.locked { opacity: 0.45; cursor: not-allowed; }
  .word-card.active-card { border-color: var(--accent); box-shadow: var(--glow); }

  .card-thumb {
    width: 100%; aspect-ratio: 16/10;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-thumb-emoji { font-size: 2.5rem; }
  .card-play {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 0.2s;
    font-size: 2rem;
  }
  .word-card:not(.locked):hover .card-play { opacity: 1; }
  .card-completed-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--accent); color: #000; border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700;
  }

  .card-body { padding: 12px 14px; }
  .card-word { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .card-category { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .card-difficulty {
    display: flex; gap: 3px; margin-top: 8px;
  }
  .diff-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border);
  }
  .diff-dot.filled { background: var(--accent); }

  /* ───── VIDEO MODAL ───── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    width: min(680px, 95vw);
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 50%;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; z-index: 10;
    transition: all 0.2s;
  }
  .modal-close:hover { background: var(--border); }

  .modal-video-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 22px 22px 0 0;
    overflow: hidden;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  /* AI Video placeholder */
  .ai-video-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: linear-gradient(135deg, #0d1520, #0a1929);
    position: relative;
  }
  .avatar-silhouette {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--surface2), var(--border));
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    border: 2px solid rgba(79,255,176,0.2);
    box-shadow: 0 0 40px rgba(79,255,176,0.1);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 20px rgba(79,255,176,0.1); }
    50% { box-shadow: 0 0 50px rgba(79,255,176,0.25); }
  }
  .video-status {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem; color: var(--accent);
    letter-spacing: 1.5px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .dot-blink { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 1.2s ease infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  .hand-anim {
    font-size: 4rem;
    animation: handWave 1.5s ease-in-out infinite;
    position: absolute;
    bottom: 30px; right: 40px;
  }
  @keyframes handWave {
    0%,100% { transform: rotate(-15deg) scale(1); }
    25% { transform: rotate(10deg) scale(1.1); }
    75% { transform: rotate(-5deg) scale(0.95); }
  }

  /* Progress ring overlay */
  .video-progress-ring {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.5);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 0.75rem; color: var(--accent);
    display: flex; align-items: center; gap: 6px;
    border: 1px solid rgba(79,255,176,0.2);
  }

  .modal-body { padding: 24px 28px 28px; }
  .modal-word { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
  .modal-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
  .badge {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.5px;
    border: 1px solid;
  }
  .badge-green { color: var(--accent); border-color: rgba(79,255,176,0.3); background: rgba(79,255,176,0.08); }
  .badge-blue { color: var(--accent2); border-color: rgba(0,201,255,0.3); background: rgba(0,201,255,0.08); }

  .modal-desc { margin-top: 16px; color: var(--muted); font-size: 0.92rem; line-height: 1.7; }

  .modal-tips {
    margin-top: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .tips-title { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
  .tip-item { display: flex; gap: 10px; font-size: 0.88rem; color: var(--muted); line-height: 1.5; }
  .tip-dot { color: var(--accent); flex-shrink: 0; margin-top: 2px; }

  .modal-actions { display: flex; gap: 12px; margin-top: 22px; }
  .btn {
    padding: 11px 22px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #00e090);
    color: #000;
    flex: 1;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,255,176,0.3); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ───── EMPTY / LOCKED LESSON ───── */
  .locked-msg {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; gap: 14px; text-align: center;
  }
  .locked-icon { font-size: 3rem; }
  .locked-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; }
  .locked-sub { color: var(--muted); font-size: 0.9rem; max-width: 320px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

  /* Mobile responsive */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
    .words-grid { grid-template-columns: repeat(2, 1fr); }
    .lesson-title { font-size: 1.5rem; }
  }

  /* Completion toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(120px);
    background: var(--accent); color: #000;
    padding: 12px 24px; border-radius: 999px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem;
    display: flex; align-items: center; gap: 8px;
    z-index: 300; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- NAV -->
<nav>
  <div class="logo">SignPath <span>/ ASL</span></div>
  <div class="nav-xp">
    <span>⚡</span>
    <span id="xpText">120 XP</span>
    <div class="xp-bar-wrap"><div class="xp-bar" id="xpBar" style="width:48%"></div></div>
    <span id="streakText">🔥 3</span>
  </div>
</nav>

<!-- APP -->
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Lessons</div>
    <div id="lessonList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent"></main>

</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-video-wrap">
      <div class="ai-video-placeholder">
        <div class="video-progress-ring">
          <div class="dot-blink"></div>
          <span id="videoTimer">0:00 / 0:08</span>
        </div>
        <div class="avatar-silhouette" id="avatarEmoji">🧑</div>
        <div class="video-status">
          <div class="dot-blink"></div>
          <span>AI Instructor · Live Demo</span>
        </div>
        <div class="hand-anim" id="handAnim">🤟</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-word" id="modalWord">HELLO</div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-tips" id="modalTips"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="prevWord()">← Prev</button>
        <button class="btn btn-primary" onclick="markComplete()">✓ Mark as Learned</button>
        <button class="btn btn-secondary" onclick="nextWord()">Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">🎉 Word learned! +10 XP</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const LESSONS = [
  {
    id: 0, name: "Greetings", icon: "👋", unlocked: true, completed: false,
    desc: "Start your ASL journey with everyday greetings and polite expressions.",
    words: [
      { word:"HELLO", emoji:"👋", hand:"👋", cat:"Greeting", diff:1,
        desc:"Open your hand and wave from your forehead outward. Keep your fingers together and your palm facing outward.",
        tips:["Start with hand near your forehead","Move hand smoothly outward and down","Keep a relaxed, natural smile — expression matters in ASL!"] },
      { word:"THANK YOU", emoji:"🙏", hand:"🤲", cat:"Polite", diff:1,
        desc:"Touch your chin or lips with your fingertips, then move your hand outward toward the person you're thanking.",
        tips:["Fingers together, palm facing you","Move outward — like blowing a kiss of gratitude","Facial expression should be warm and genuine"] },
      { word:"PLEASE", emoji:"😊", hand:"🖐️", cat:"Polite", diff:1,
        desc:"Place your open hand on your chest and move it in a circular motion.",
        tips:["Flat hand on the center of your chest","Circle clockwise (from your perspective)","Typically accompanied by a slight nod"] },
      { word:"SORRY", emoji:"😔", hand:"✊", cat:"Polite", diff:2,
        desc:"Make a fist and rub it in a circular motion over your chest/heart area.",
        tips:["Closed fist, not too tight","Circle over the heart, medium-sized circles","A slightly downward gaze reinforces the meaning"] },
      { word:"GOODBYE", emoji:"👋", hand:"🖐", cat:"Greeting", diff:1,
        desc:"Open your hand and wave, similar to a natural wave goodbye, typically at shoulder height.",
        tips:["Palm faces outward","Relaxed wave motion, 2–3 times","Friendly facial expression throughout"] },
    ]
  },
  {
    id: 1, name: "Numbers 1–10", icon: "🔢", unlocked: true, completed: false,
    desc: "Learn to count from 1 to 10 — essential for phone numbers, ages, and more.",
    words: [
      { word:"ONE", emoji:"1️⃣", hand:"☝️", cat:"Number", diff:1,
        desc:"Hold up your index finger with the rest of your hand closed into a fist.",
        tips:["Index finger pointing straight up","Keep other fingers folded","Hold palm inward or outward — both are used"] },
      { word:"TWO", emoji:"2️⃣", hand:"✌️", cat:"Number", diff:1,
        desc:"Extend your index and middle fingers upward, keeping the rest closed.",
        tips:["Classic peace sign shape","Fingers can be together or slightly spread","Keep wrist steady"] },
      { word:"THREE", emoji:"3️⃣", hand:"🤟", cat:"Number", diff:1,
        desc:"Extend your thumb, index finger, and middle finger.",
        tips:["Thumb points to the side","Index and middle point up","Ring and pinky finger are folded"] },
      { word:"FOUR", emoji:"4️⃣", hand:"🖖", cat:"Number", diff:2,
        desc:"Extend all four fingers (index through pinky) upward with the thumb tucked in.",
        tips:["Four fingers spread and pointing up","Thumb folds across your palm","Keep fingers straight, not curved"] },
      { word:"FIVE", emoji:"5️⃣", hand:"🖐️", cat:"Number", diff:1,
        desc:"Spread all five fingers open wide.",
        tips:["All five fingers extended, spread apart","Palm faces outward","Relax your hand — no tension"] },
    ]
  },
  {
    id: 2, name: "Family", icon: "👨‍👩‍👧", unlocked: false, completed: false,
    desc: "Express family relationships and the people closest to you.",
    words: [
      { word:"MOTHER", emoji:"👩", hand:"🖐️", cat:"Family", diff:2, desc:"...", tips:[] },
      { word:"FATHER", emoji:"👨", hand:"🖐️", cat:"Family", diff:2, desc:"...", tips:[] },
      { word:"SISTER", emoji:"👧", hand:"🤙", cat:"Family", diff:2, desc:"...", tips:[] },
      { word:"BROTHER", emoji:"👦", hand:"🤙", cat:"Family", diff:2, desc:"...", tips:[] },
    ]
  },
  {
    id: 3, name: "Colors", icon: "🎨", unlocked: false, completed: false,
    desc: "Describe the world around you with vibrant color signs.",
    words: [
      { word:"RED", emoji:"🔴", hand:"☝️", cat:"Color", diff:1, desc:"...", tips:[] },
      { word:"BLUE", emoji:"🔵", hand:"🤙", cat:"Color", diff:1, desc:"...", tips:[] },
      { word:"GREEN", emoji:"🟢", hand:"✌️", cat:"Color", diff:1, desc:"...", tips:[] },
      { word:"YELLOW", emoji:"🟡", hand:"🤙", cat:"Color", diff:2, desc:"...", tips:[] },
    ]
  },
  {
    id: 4, name: "Emotions", icon: "😄", unlocked: false, completed: false,
    desc: "Share how you feel — expressions are a huge part of ASL.",
    words: [
      { word:"HAPPY", emoji:"😄", hand:"🖐️", cat:"Emotion", diff:1, desc:"...", tips:[] },
      { word:"SAD", emoji:"😢", hand:"🤲", cat:"Emotion", diff:1, desc:"...", tips:[] },
      { word:"ANGRY", emoji:"😠", hand:"✊", cat:"Emotion", diff:2, desc:"...", tips:[] },
      { word:"LOVE", emoji:"❤️", hand:"🤟", cat:"Emotion", diff:1, desc:"...", tips:[] },
    ]
  }
];

// ─── STATE ─────────────────────────────────────────────────────────────────
let activeLessonId = 0;
let activeWordIndex = 0;
let completedWords = new Set();
let xp = 120;
let streak = 3;
let timerInterval = null;

// ─── RENDER SIDEBAR ────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('lessonList');
  list.innerHTML = LESSONS.map(l => `
    <button class="lesson-btn ${l.id===activeLessonId?'active':''} "
      onclick="selectLesson(${l.id})" ${!l.unlocked?'disabled':''}>
      <div class="lesson-icon">${l.icon}</div>
      <div class="lesson-info">
        <div class="lesson-name">${l.name}</div>
        <div class="lesson-count">${l.words.length} signs</div>
      </div>
      ${l.completed ? '<div class="lesson-done">✓</div>' : ''}
      ${!l.unlocked ? '<div class="lesson-lock">🔒</div>' : ''}
    </button>
  `).join('');
}

// ─── RENDER MAIN ───────────────────────────────────────────────────────────
function renderMain() {
  const lesson = LESSONS[activeLessonId];
  const done = lesson.words.filter((_,i) => completedWords.has(`${lesson.id}-${i}`)).length;
  const pct = Math.round((done/lesson.words.length)*100);

  const main = document.getElementById('mainContent');

  if (!lesson.unlocked) {
    main.innerHTML = `<div class="locked-msg">
      <div class="locked-icon">🔒</div>
      <div class="locked-title">Lesson Locked</div>
      <div class="locked-sub">Complete previous lessons to unlock ${lesson.name}.</div>
    </div>`;
    return;
  }

  main.innerHTML = `
    <div class="lesson-header">
      <div class="lesson-tag">Lesson ${activeLessonId + 1} · ${lesson.words.length} Signs</div>
      <div class="lesson-title">${lesson.icon} ${lesson.name}</div>
      <div class="lesson-desc">${lesson.desc}</div>
    </div>
    <div class="progress-row">
      <span class="prog-label">${done}/${lesson.words.length} learned</span>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="prog-label">${pct}%</span>
    </div>
    <div class="words-grid" id="wordsGrid"></div>
  `;

  const grid = document.getElementById('wordsGrid');
  grid.innerHTML = lesson.words.map((w, i) => {
    const key = `${lesson.id}-${i}`;
    const done = completedWords.has(key);
    return `
      <div class="word-card ${done?'completed':''}" onclick="openWord(${i})">
        <div class="card-thumb">
          <div class="card-thumb-emoji">${w.emoji}</div>
          <div class="card-play">▶</div>
          ${done ? '<div class="card-completed-badge">✓</div>' : ''}
        </div>
        <div class="card-body">
          <div class="card-word">${w.word}</div>
          <div class="card-category">${w.cat}</div>
          <div class="card-difficulty">
            ${[1,2,3].map(d=>`<div class="diff-dot ${d<=w.diff?'filled':''}"></div>`).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ─── LESSON SELECT ─────────────────────────────────────────────────────────
function selectLesson(id) {
  if (!LESSONS[id].unlocked) return;
  activeLessonId = id;
  renderSidebar();
  renderMain();
}

// ─── OPEN WORD MODAL ───────────────────────────────────────────────────────
function openWord(index) {
  activeWordIndex = index;
  const lesson = LESSONS[activeLessonId];
  const w = lesson.words[index];
  const key = `${lesson.id}-${index}`;

  document.getElementById('modalWord').textContent = w.word;
  document.getElementById('avatarEmoji').textContent = ['🧑','👩','🧑‍🦱','👩‍🦰','🧑‍🦲'][index % 5];
  document.getElementById('handAnim').textContent = w.hand;

  document.getElementById('modalMeta').innerHTML = `
    <span class="badge badge-green">${w.cat}</span>
    <span class="badge badge-blue">${['Beginner','Intermediate','Advanced'][w.diff-1]}</span>
    ${completedWords.has(key) ? '<span class="badge badge-green">✓ Learned</span>' : ''}
  `;

  document.getElementById('modalDesc').textContent = w.desc || 'Watch the AI instructor demonstrate this sign carefully, then practice along!';

  document.getElementById('modalTips').innerHTML = w.tips && w.tips.length ? `
    <div class="tips-title">💡 Tips</div>
    ${w.tips.map(t=>`<div class="tip-item"><span class="tip-dot">→</span><span>${t}</span></div>`).join('')}
  ` : '';

  startVideoTimer();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  clearInterval(timerInterval);
}

function startVideoTimer() {
  clearInterval(timerInterval);
  let sec = 0; const total = 8;
  document.getElementById('videoTimer').textContent = `0:00 / 0:0${total}`;
  timerInterval = setInterval(() => {
    sec = (sec + 1) % (total + 1);
    const s = sec < 10 ? `0:0${sec}` : `0:${sec}`;
    document.getElementById('videoTimer').textContent = `${s} / 0:0${total}`;
  }, 1000);
}

function prevWord() {
  const len = LESSONS[activeLessonId].words.length;
  activeWordIndex = (activeWordIndex - 1 + len) % len;
  openWord(activeWordIndex);
}
function nextWord() {
  const len = LESSONS[activeLessonId].words.length;
  activeWordIndex = (activeWordIndex + 1) % len;
  openWord(activeWordIndex);
}

function markComplete() {
  const key = `${activeLessonId}-${activeWordIndex}`;
  if (!completedWords.has(key)) {
    completedWords.add(key);
    xp += 10;
    showToast();
    updateXP();
    checkLessonComplete();
  }
  closeModal();
  renderMain();
}

function checkLessonComplete() {
  const lesson = LESSONS[activeLessonId];
  const allDone = lesson.words.every((_,i) => completedWords.has(`${activeLessonId}-${i}`));
  if (allDone) {
    lesson.completed = true;
    // unlock next
    if (activeLessonId + 1 < LESSONS.length) {
      LESSONS[activeLessonId + 1].unlocked = true;
    }
    xp += 50;
    updateXP();
  }
}

function updateXP() {
  document.getElementById('xpText').textContent = `${xp} XP`;
  document.getElementById('xpBar').style.width = `${(xp % 200) / 2}%`;
  document.getElementById('streakText').textContent = `🔥 ${streak}`;
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── INIT ──────────────────────────────────────────────────────────────────
renderSidebar();
renderMain();
</script>
</body>
</html>
